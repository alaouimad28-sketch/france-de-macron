# Supabase local configuration
# https://supabase.com/docs/reference/cli/config

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
# Port sur l'hôte. (Dans les logs, "localhost:3000" = port interne du conteneur Studio, pas ton app.)
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
# Désactivé en local uniquement (conteneur souvent "unhealthy" au start).
# Les données API (carburants, FCI, votes, newsletter) sont en Postgres, pas ici.
# Storage = fichiers (images, uploads). En prod Supabase, Storage reste dispo si besoin.
enabled = false
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3040"
jwt_expiry = 3600
enable_signup = false   # Pas d'auth utilisateur MVP

[analytics]
enabled = false
